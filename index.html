<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Foundry — Allmer Group</title>
<link rel="icon" type="image/png" sizes="32x32" href="Logo/favicons/favicon_32.png">
<link rel="icon" type="image/png" sizes="16x16" href="Logo/favicons/favicon_16.png">
<link rel="icon" type="image/png" sizes="192x192" href="Logo/favicons/favicon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="Logo/favicons/favicon-512.png">
<link rel="apple-touch-icon" sizes="180x180" href="Logo/favicons/apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; background: #080808; color: #e8e4dc; font-family: 'Courier Prime', monospace; }
  .brand-font { font-family: 'Cinzel', serif; }

  .status-done     { background: #4a7c59; box-shadow: 0 0 8px #4a7c5966; }
  .status-progress { background: #b8860b; box-shadow: 0 0 8px #b8860b66; }
  .status-pending  { background: #8b3a3a; box-shadow: 0 0 8px #8b3a3a44; }

  .scanlines::after {
    content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
    pointer-events: none; z-index: 9999;
  }

  .variant-card { transition: border-color 0.2s, background 0.2s; }
  .variant-card:hover { border-color: #D4AF37 !important; background: #111 !important; }
  .variant-card.active { border-color: #D4AF37 !important; background: #0f0e08 !important; }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: #111; }
  ::-webkit-scrollbar-thumb { background: #333; }

  /* ── LIGHT MODE ─────────────────────────────────────────────────────────── */
  html.light-mode body { background: #e8e3db; color: #2a1f14; }
  html.light-mode .scanlines::after { display: none; }

  /* Page / card backgrounds */
  html.light-mode [class*="bg-[#080808"] { background-color: #e8e3db !important; }
  html.light-mode [class*="bg-[#050505"] { background-color: #ddd8cf !important; }
  html.light-mode [class*="bg-[#09090"]  { background-color: #d8d2c8 !important; }
  html.light-mode [class*="bg-[#0a0a0"]  { background-color: #dad5cb !important; }
  html.light-mode [class*="bg-[#0d0d0"]  { background-color: #d5d0c6 !important; }
  html.light-mode [class*="bg-[#111"]    { background-color: #cdc8be !important; }
  html.light-mode .bg-black              { background-color: #e8e3db !important; }

  /* Borders */
  html.light-mode [class*="border-[#1"]  { border-color: #b8b0a4 !important; }
  html.light-mode [class*="border-[#2"]  { border-color: #aaa29a !important; }
  html.light-mode [class*="border-[#3"]  { border-color: #9c9490 !important; }

  /* Text */
  html.light-mode .text-white            { color: #1a1510 !important; }
  html.light-mode .text-gray-200         { color: #2a2018 !important; }
  html.light-mode .text-gray-300         { color: #3d3020 !important; }
  html.light-mode .text-gray-400         { color: #5a4838 !important; }
  html.light-mode .text-gray-500         { color: #6b5848 !important; }
  html.light-mode .text-gray-600         { color: #7a6858 !important; }
  html.light-mode .text-gray-700         { color: #9a8070 !important; }
  html.light-mode .text-gray-800         { color: #b09880 !important; }

  /* Gold — richer in light */
  html.light-mode [class*="text-[#D4AF37"]   { color: #8a6a00 !important; }
  html.light-mode [class*="border-[#D4AF37"] { border-color: #8a6a00 !important; }
  html.light-mode [class*="bg-[#D4AF37"]     { background-color: #8a6a00 !important; }

  /* Variant card hover */
  html.light-mode .variant-card:hover  { border-color: #8a6a00 !important; background: #cdc8be !important; }
  html.light-mode .variant-card.active { border-color: #8a6a00 !important; background: #d5cec4 !important; }

  /* Scrollbar */
  html.light-mode ::-webkit-scrollbar-track { background: #e0dbd2; }
  html.light-mode ::-webkit-scrollbar-thumb { background: #a89880; }
</style>
</head>
<body class="scanlines">
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

// ─── STOCK PARTS LIBRARY ─────────────────────────────────────────────────────
// PT = Foundry stock part. Cross-project. Slash suffix = colour/variant.
// Color codes: W=White  K=Black  BL=Blue  R=Red

const PARTS = [
  {
    code: 'PT001',
    name: 'Magnet',
    shape: 'Round',
    spec: 'Ø 5 mm × 2 mm height',
    variants: null,  // no colour variants
  },
  {
    code: 'PT002',
    name: 'Game Stone',
    shape: 'Round',
    spec: 'Ø 13.8 mm × 2.4 mm height',
    variants: [
      { suffix: 'W',  label: 'White',  color: '#e8e4dc', textDark: true  },
      { suffix: 'K',  label: 'Black',  color: '#1a1a1a', textDark: false },
      { suffix: 'BL', label: 'Blue',   color: '#3b6fa0', textDark: false },
      { suffix: 'R',  label: 'Red',    color: '#8b3a3a', textDark: false },
    ],
    variantNote: 'W/K: 2-player games · BL/R: 4-player (colored) games',
  },
  {
    code: 'PT003',
    name: 'Dice',
    shape: 'Cube',
    spec: 'Standard size — spec TBD',
    variants: [
      { suffix: 'W',  label: 'White', color: '#e8e4dc', textDark: true  },
      { suffix: 'K',  label: 'Black', color: '#1a1a1a', textDark: false },
      { suffix: 'BL', label: 'Blue',  color: '#3b6fa0', textDark: false },
      { suffix: 'R',  label: 'Red',   color: '#8b3a3a', textDark: false },
    ],
    variantNote: 'W/K: 2-player games · BL/R: 4-player (colored) games',
  },
  {
    code: 'PT004',
    name: 'Magnetic Primer',
    shape: 'Liquid',
    spec: 'Grundierung für Magnet-Haftflächen · Apply min. 3 coats',
    variants: null,
    manufacturer: { name: 'Marabu', label: 'Magnet Grundierung', url: 'https://www.marabu.com' },
  },
  {
    code: 'PT005',
    name: 'Magnet Stone',
    shape: 'Round',
    spec: 'Ø 13.8 mm × 2.4 mm height · magnetic',
    note: 'For games with magnetic primer applied to game board',
    variants: [
      { suffix: 'W',  label: 'White', color: '#e8e4dc', textDark: true  },
      { suffix: 'K',  label: 'Black', color: '#1a1a1a', textDark: false },
      { suffix: 'BL', label: 'Blue',  color: '#3b6fa0', textDark: false },
      { suffix: 'R',  label: 'Red',   color: '#8b3a3a', textDark: false },
    ],
    variantNote: 'Same color coding as PT002 · W/K: 2-player · BL/R: 4-player',
  },
  {
    code: 'PT006',
    name: 'Structure Paint',
    shape: 'Spray',
    spec: 'Metallic spray · applied to structural parts only · not for game stones',
    variants: [
      { suffix: 'CU', label: 'Copper', color: '#b87333', textDark: false, manufacturer: { name: 'Belton Special', label: 'Kupfer-Effekt', url: 'https://www.belton.de' } },
      { suffix: 'AG', label: 'Silver', color: '#b0b8c0', textDark: true,  manufacturer: null },
      { suffix: 'AU', label: 'Gold',   color: '#D4AF37', textDark: false, manufacturer: null },
    ],
    variantNote: 'CU: Belton Special · AG/AU: sources TBD',
  },
];

// ─── SEVEN WONDERS PRODUCTS ──────────────────────────────────────────────────
// SW001–SW028 · sequential, no series prefix · physical only
// 001-014 = Old Seven Wonders · 015-028 = New Seven Wonders

const WONDERS = [
  // OLD
  { name: 'Pyramid',    series: 'Old', p2: { code: 'SW001', status: 'done'     }, p4: { code: 'SW002', status: 'progress' } },
  { name: 'Gardens',    series: 'Old', p2: { code: 'SW003', status: 'pending'  }, p4: { code: 'SW004', status: 'pending'  } },
  { name: 'Temple',     series: 'Old', p2: { code: 'SW005', status: 'pending'  }, p4: { code: 'SW006', status: 'pending'  } },
  { name: 'Statue',     series: 'Old', p2: { code: 'SW007', status: 'done',
      dice: [{ suffix: 'W', label: 'White', qty: 8 }, { suffix: 'K', label: 'Black', qty: 8 }],
      structure: [
        { code: 'SW007A', name: 'Game Field',  dims: '135.3 × 135.3 mm', note: 'Base plate',              connection: null },
        { code: 'SW007B', name: 'Extension',   dims: '73.8 × 73.8 mm',   note: 'Mounts on Game Field',    connection: null },
        { code: 'SW007C', name: 'Figure',      dims: '73.8 × 73.8 mm',   note: 'Widest part of figure',   connection: null },
      ],
    }, p4: { code: 'SW008', status: 'pending'  } },
  { name: 'Mausoleum',  series: 'Old', p2: { code: 'SW009', status: 'progress' }, p4: { code: 'SW010', status: 'pending'  } },
  { name: 'Colossus',   series: 'Old', p2: { code: 'SW011', status: 'done'     }, p4: { code: 'SW012', status: 'pending'  } },
  { name: 'Pharos',     series: 'Old', p2: { code: 'SW013', status: 'done'     }, p4: { code: 'SW014', status: 'progress' } },
  // NEW
  { name: 'Colosseum',  series: 'New', p2: { code: 'SW015', status: 'pending'  }, p4: { code: 'SW016', status: 'pending'  } },
  { name: 'Great Wall', series: 'New', p2: { code: 'SW017', status: 'progress' }, p4: { code: 'SW018', status: 'pending'  } },
  { name: 'Tower',      series: 'New', p2: { code: 'SW019', status: 'pending'  }, p4: { code: 'SW020', status: 'pending'  } },
  { name: 'Citadel',    series: 'New', p2: { code: 'SW021', status: 'pending'  }, p4: { code: 'SW022', status: 'pending'  } },
  { name: 'Cathedral',  series: 'New', p2: { code: 'SW023', status: 'pending'  }, p4: { code: 'SW024', status: 'pending'  } },
  { name: 'Palace',     series: 'New', p2: { code: 'SW025', status: 'pending'  }, p4: { code: 'SW026', status: 'pending'  } },
  { name: 'Skyscraper', series: 'New', p2: { code: 'SW027', status: 'pending', magneticBoard: true }, p4: { code: 'SW028', status: 'progress', magneticBoard: true,
      stones: ['W', 'K', 'BL', 'R'],
      structure: [
        { code: 'SW028A', name: 'Bottom Structure', dims: '104.4 × 104.4 mm', note: 'Reference plate · widest at base', connection: null },
        { code: 'SW028B', name: 'Top Structure',    dims: '84 × 84 mm',       note: 'Glued to Bottom Structure',        connection: 'adhesive' },
        { code: 'SW028C', name: 'Bottom Roof',      dims: '84 × 84 mm',       note: 'Magnets → Top Structure',          connection: 'magnet' },
        { code: 'SW028D', name: 'Top Roof',         dims: 'TBD',              note: 'Magnets → Bottom Roof',            connection: 'magnet' },
      ],
    } },
];

const STATUS_LABEL = { done: 'Production Ready', progress: 'In Progress', pending: 'Pending' };
const STATUS_COLOR = { done: '#4a7c59', progress: '#b8860b', pending: '#5a3535' };

// ─── SHARED COMPONENTS ───────────────────────────────────────────────────────

const StatusDot = ({ status }) => (
  <span className={`inline-block w-2 h-2 rounded-full flex-shrink-0 status-${status}`}></span>
);

const Divider = ({ label }) => (
  <div className="flex items-center gap-3 mb-2 mt-6">
    <span className="text-[8px] font-mono text-gray-700 uppercase tracking-[0.3em]">{label}</span>
    <div className="flex-1 h-[1px] bg-[#1a1a1a]"></div>
  </div>
);

// ─── PARTS PANEL ─────────────────────────────────────────────────────────────

const CONNECTION_ICON = { adhesive: '⬡', magnet: '⊕' };
const CONNECTION_LABEL = { adhesive: 'Adhesive bond', magnet: 'Magnet connection' };

const PartsPanel = ({ wonder, variantKey, variantData }) => {
  const label = variantKey === 'p2' ? '2 Player · Physical' : '4 Player · Physical';
  const is4p = variantKey === 'p4';

  // Stone variants: use per-variant override if defined, otherwise default by player count
  const stonePart = variantData.magneticBoard ? PARTS.find(p => p.code === 'PT005') : PARTS.find(p => p.code === 'PT002');
  const stoneVariants = variantData.stones
    ? stonePart.variants.filter(v => variantData.stones.includes(v.suffix))
    : is4p
      ? stonePart.variants.filter(v => v.suffix === 'BL' || v.suffix === 'R')
      : stonePart.variants.filter(v => v.suffix === 'W'  || v.suffix === 'K');

  return (
    <div className="border border-[#D4AF37]/30 bg-[#09090a] p-5 mt-1">
      <div className="flex items-start justify-between mb-5">
        <div>
          <p className="text-[9px] text-gray-700 uppercase tracking-[0.25em] mb-1">Foundry Works · Seven Wonders</p>
          <h3 className="brand-font text-[#D4AF37] text-base uppercase tracking-widest">{wonder.name}</h3>
          <p className="text-[10px] text-gray-600 font-mono mt-0.5">{label}</p>
        </div>
        <div className="text-right">
          <p className="text-[8px] text-gray-700 uppercase tracking-widest mb-1">Foundry No.</p>
          <p className="font-mono text-[#D4AF37] text-xl font-bold">{variantData.code}</p>
          <div className="flex items-center gap-1.5 justify-end mt-1">
            <StatusDot status={variantData.status} />
            <span className="text-[9px] font-mono" style={{ color: STATUS_COLOR[variantData.status] }}>{STATUS_LABEL[variantData.status]}</span>
          </div>
        </div>
      </div>

      {/* Bill of Materials */}
      <div className="border-t border-[#1a1a1a] pt-4">
        <p className="text-[9px] text-gray-700 uppercase tracking-[0.2em] mb-3">Bill of Materials</p>
        <div className="flex flex-col gap-2">

          {/* Magnet — only shown when the variant uses magnets */}
          {(!variantData.structure || variantData.structure.some(p => p.connection === 'magnet')) && (
            <div className="flex items-center justify-between border border-[#1a1a1a] bg-[#050505] px-3 py-2">
              <div className="flex items-center gap-3">
                <span className="font-mono text-[#D4AF37] text-xs font-bold">PT001</span>
                <div>
                  <p className="text-gray-300 text-[11px] font-mono">Magnet · Round</p>
                  <p className="text-gray-700 text-[9px] font-mono">Ø 5 mm × 2 mm</p>
                </div>
              </div>
              <span className="text-gray-700 font-mono text-[10px]">qty TBD</span>
            </div>
          )}

          {/* Magnetic Primer — only for games with magneticBoard */}
          {variantData.magneticBoard && (
            <div className="flex items-center justify-between border border-[#1a1a1a] bg-[#050505] px-3 py-2">
              <div className="flex items-center gap-3">
                <span className="font-mono text-[#D4AF37] text-xs font-bold">PT004</span>
                <div>
                  <p className="text-gray-300 text-[11px] font-mono">Magnetic Primer · Liquid</p>
                  <p className="text-gray-700 text-[9px] font-mono">Min. 3 coats · applied to game board</p>
                </div>
              </div>
              <a href="https://www.marabu.com" target="_blank" rel="noopener noreferrer"
                className="text-[9px] font-mono text-gray-700 hover:text-[#D4AF37] transition-colors whitespace-nowrap">Marabu ↗</a>
            </div>
          )}

          {/* Dice (when defined) — replaces stones */}
          {variantData.dice ? (
            <div className="border border-[#1a1a1a] bg-[#050505]">
              <div className="flex items-center justify-between px-3 py-2 border-b border-[#111]">
                <div className="flex items-center gap-3">
                  <span className="font-mono text-[#D4AF37] text-xs font-bold">PT003</span>
                  <div>
                    <p className="text-gray-300 text-[11px] font-mono">Dice · Cube</p>
                    <p className="text-gray-700 text-[9px] font-mono">Spec TBD</p>
                  </div>
                </div>
              </div>
              <div className="flex flex-wrap gap-2 px-3 py-2">
                {variantData.dice.map(d => {
                  const pt = PARTS.find(p => p.code === 'PT003').variants.find(v => v.suffix === d.suffix);
                  return (
                    <div key={d.suffix} className="flex items-center gap-1.5 border border-[#222] px-2 py-1">
                      <div className="w-3 h-3 rounded-sm border border-[#333]" style={{ background: pt ? pt.color : '#888' }}></div>
                      <span className="font-mono text-[10px] text-gray-400">PT003/<span className="text-[#D4AF37]">{d.suffix}</span></span>
                      <span className="font-mono text-[9px] text-gray-700">· {d.label}</span>
                      <span className="font-mono text-[9px] text-[#D4AF37] ml-1">×{d.qty}</span>
                    </div>
                  );
                })}
              </div>
            </div>
          ) : (
            /* Game Stone / Magnet Stone with variants */
            <div className="border border-[#1a1a1a] bg-[#050505]">
              <div className="flex items-center justify-between px-3 py-2 border-b border-[#111]">
                <div className="flex items-center gap-3">
                  <span className="font-mono text-[#D4AF37] text-xs font-bold">{stonePart.code}</span>
                  <div>
                    <p className="text-gray-300 text-[11px] font-mono">{stonePart.name} · {stonePart.shape}</p>
                    <p className="text-gray-700 text-[9px] font-mono">{stonePart.spec}</p>
                  </div>
                </div>
                <span className="text-gray-700 font-mono text-[10px]">qty TBD</span>
              </div>
              <div className="flex flex-wrap gap-2 px-3 py-2">
                {stoneVariants.map(v => (
                  <div key={v.suffix} className="flex items-center gap-1.5 border border-[#222] px-2 py-1">
                    <div className="w-3 h-3 rounded-full border border-[#333]" style={{ background: v.color }}></div>
                    <span className="font-mono text-[10px] text-gray-400">{stonePart.code}/<span className="text-[#D4AF37]">{v.suffix}</span></span>
                    <span className="font-mono text-[9px] text-gray-700">· {v.label}</span>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* Placeholder when no structure is defined */}
          {!variantData.structure && (
            <div className="border border-dashed border-[#1a1a1a] px-3 py-2 text-center">
              <p className="text-gray-800 font-mono text-[9px] uppercase tracking-widest">Further parts not yet defined · {variantData.code}A · {variantData.code}B ···</p>
            </div>
          )}

        </div>
      </div>

      {/* Structural Parts — rendered when defined on the variant */}
      {variantData.structure && (
        <div className="border-t border-[#1a1a1a] pt-4 mt-4">
          <p className="text-[9px] text-gray-700 uppercase tracking-[0.2em] mb-3">Structural Parts</p>
          <div className="flex flex-col gap-2">
            {variantData.structure.map((part, idx) => (
              <div key={part.code} className="border border-[#1a1a1a] bg-[#050505] px-3 py-2.5">
                <div className="flex items-start justify-between gap-4">
                  <div className="flex items-start gap-3 flex-1 min-w-0">
                    <span className="font-mono text-[#D4AF37] text-xs font-bold w-16 flex-shrink-0">{part.code}</span>
                    <div className="min-w-0">
                      <p className="text-gray-300 text-[11px] font-mono">{part.name}</p>
                      <p className="text-gray-700 text-[9px] font-mono mt-0.5">{part.note}</p>
                    </div>
                  </div>
                  <div className="text-right flex-shrink-0">
                    <p className="font-mono text-gray-400 text-[10px]">{part.dims}</p>
                    {part.connection && (
                      <p className="font-mono text-[9px] mt-0.5" style={{ color: part.connection === 'magnet' ? '#D4AF37' : '#6b8c6b' }}>
                        {CONNECTION_ICON[part.connection]} {CONNECTION_LABEL[part.connection]}
                      </p>
                    )}
                  </div>
                </div>
                {/* Show assembly arrow between parts */}
                {idx < variantData.structure.length - 1 && (
                  <div className="mt-1.5 ml-[4.5rem] text-[9px] font-mono text-gray-800">↓</div>
                )}
              </div>
            ))}
          </div>
        </div>
      )}

    </div>
  );
};

// ─── WONDER ROW ──────────────────────────────────────────────────────────────

const VariantBtn = ({ label, code, status, active, onClick }) => (
  <button onClick={onClick}
    className={`variant-card border text-left p-3 w-full ${active ? 'active border-[#D4AF37]' : 'border-[#1e1e1e] bg-[#0a0a0a]'}`}>
    <p className="text-[8px] text-gray-700 uppercase tracking-[0.18em] mb-1">{label}</p>
    <p className={`font-mono text-xs font-bold mb-2 ${active ? 'text-[#D4AF37]' : 'text-gray-400'}`}>{code}</p>
    <div className="flex items-center gap-1.5">
      <StatusDot status={status} />
      <span className="text-[8px] font-mono" style={{ color: STATUS_COLOR[status] }}>{STATUS_LABEL[status]}</span>
    </div>
  </button>
);

const WonderRow = ({ wonder, showDivider }) => {
  const [active, setActive] = useState(null);
  const toggle = (key) => setActive(prev => prev === key ? null : key);
  return (
    <div>
      {showDivider && <Divider label="New Seven Wonders" />}
      <div className="border border-[#1a1a1a] bg-[#050505] mb-1">
        <div className="grid grid-cols-3 items-center gap-2 p-2.5">
          <div className="flex items-center gap-2">
            <div className="w-[3px] h-6 bg-[#D4AF37]/20 flex-shrink-0"></div>
            <span className="brand-font text-[11px] text-gray-300 uppercase tracking-wider">{wonder.name}</span>
          </div>
          <VariantBtn label="2 Player · Physical" code={wonder.p2.code} status={wonder.p2.status} active={active === 'p2'} onClick={() => toggle('p2')} />
          <VariantBtn label="4 Player · Physical" code={wonder.p4.code} status={wonder.p4.status} active={active === 'p4'} onClick={() => toggle('p4')} />
        </div>
        {active && (
          <div className="px-2.5 pb-2.5">
            <PartsPanel wonder={wonder} variantKey={active} variantData={wonder[active]} />
          </div>
        )}
      </div>
    </div>
  );
};

// ─── WORKS PAGE ──────────────────────────────────────────────────────────────

const WorksPage = () => {
  const [showParts, setShowParts] = useState(false);

  return (
    <div className="max-w-4xl mx-auto px-4 py-8">

      {/* Project header */}
      <div className="border border-[#1e1e1e] bg-[#0a0a0a] p-5 mb-6 flex items-start justify-between">
        <div>

          { phase:'Phase 1', name:'Labs R&D',        status:'progress', desc:'Develop and patent material fingerprinting for wood, ceramic, and leather. Define scanning calibration standard. File IP before market open.' },
          { phase:'Phase 2', name:'Exchange Build',  status:'pending',  desc:'Registry infrastructure, artisan registration portal, consumer verification app. Phone-camera verification is the target — no proprietary hardware required for the buyer.' },
          { phase:'Phase 3', name:'Market Open',     status:'pending',  desc:'Foundry Mark opens to external makers. Per-registration fee model. First targets: independent woodworkers, ceramicists, fine art printmakers, independent distilleries.' },
          { phase:'Phase 4', name:'Standard',        status:'pending',  desc:'Buyers begin demanding the mark. Galleries, auction houses, and premium retailers integrate the verification API. The mark self-replicates through buyer preference — the same mechanism as UL certification or Fairtrade.' },
        ].map(p => (
          <div key={p.phase} className="border border-[#1a1a1a] bg-[#080808] px-4 py-3 flex gap-4 items-start">
            <div className="flex-shrink-0 w-20">
              <p className="font-mono text-[#D4AF37] text-[10px]">{p.phase}</p>
              <div className="flex items-center gap-1 mt-1.5">
                <StatusDot status={p.status} />
                <span className="text-[9px] font-mono" style={{color: STATUS_COLOR[p.status]}}>{STATUS_LABEL[p.status]}</span>
              </div>
            </div>
            <div className="flex-1">
              <p className="brand-font text-gray-300 text-[10px] uppercase tracking-wider mb-1">{p.name}</p>
              <p className="text-gray-500 text-[11px] font-mono leading-relaxed">{p.desc}</p>
            </div>
          </div>
        ))}
      </div>
    </div>

    {/* Mandate */}
    <div className="border border-[#1a1a1a] bg-[#050505] p-5">
      <p className="text-[9px] text-gray-700 uppercase tracking-[0.2em] mb-3">Mark Mandate</p>
      <p className="text-gray-500 text-[11px] font-mono leading-relaxed">
        Foundry Mark does not compete with the objects it certifies. It is the infrastructure beneath them —
        the registry that makes provenance legible, the mark that makes human origin transferable, the standard
        that compounds in value as more objects enter the system. When an artist registers their work,
        they are not licensing a brand. They are entering a permanent record.
        The mark means one thing: a human made this, Foundry can prove it, and that proof will hold.
      </p>
    </div>

  </div>
);

// ─── APP ─────────────────────────────────────────────────────────────────────

const BREADCRUMB = {
  home:     '',
  works:    'Foundry Works — Precision Fabrication',
  labs:     'Foundry Labs — Research & Development',
  exchange: 'Foundry Exchange — Digital Ventures',
  mark:     'Foundry Mark — Authentication Standard',
  envoy:    '',
};

const App = () => {
  const [tab, setTab] = useState('home');
  const [isDark, setIsDark] = useState(true);

  useEffect(() => {
    if (isDark) document.documentElement.classList.remove('light-mode');
    else         document.documentElement.classList.add('light-mode');
  }, [isDark]);

  return (
    <div className="min-h-screen bg-[#080808]">

      <header className="border-b border-[#1a1a1a] bg-[#050505] sticky top-0 z-50">
        <div className="max-w-4xl mx-auto px-4 h-12 flex items-center justify-between">
          <button onClick={() => setTab('home')} className="flex items-center gap-4 group">
            <div className="flex items-center gap-2">
              <div className="w-2 h-2 rotate-45 bg-[#D4AF37] group-hover:opacity-70 transition-opacity" style={{boxShadow:'0 0 6px #D4AF37'}}></div>
              <span className="brand-font text-[#D4AF37] text-sm uppercase tracking-[0.3em] group-hover:opacity-70 transition-opacity">Foundry</span>
            </div>
            <span className="text-gray-800 font-mono text-[9px]">/ Allmer Group</span>
          </button>
          <div className="flex items-center gap-1">
            {['works','labs','exchange'].map(t => (
              <button key={t} onClick={() => setTab(t)}
                className={`px-3 py-1.5 text-[10px] font-mono uppercase tracking-[0.2em] border transition-all ${
                  tab === t ? 'border-[#D4AF37] text-[#D4AF37]' : 'border-transparent text-gray-600 hover:text-gray-400'
                }`}>
                {t}
              </button>
            ))}
            <div className="w-[1px] h-4 bg-[#222] mx-1"></div>
            {['mark','envoy'].map(t => (
              <button key={t} onClick={() => setTab(t)}
                className={`px-3 py-1.5 text-[10px] font-mono uppercase tracking-[0.2em] border transition-all ${
                  tab === t ? 'border-[#D4AF37] text-[#D4AF37]' : 'border-transparent text-gray-600 hover:text-gray-400'
                }`}>
                {t}
              </button>
            ))}
            <div className="w-[1px] h-4 bg-[#222] mx-1"></div>
            <button onClick={() => setIsDark(d => !d)}
              title={isDark ? 'Switch to light mode' : 'Switch to dark mode'}
              className="px-2.5 py-1.5 border border-transparent text-gray-600 hover:text-gray-400 transition-colors text-[13px]">
              {isDark ? '☀︎' : '☾'}
            </button>
          </div>
        </div>
      </header>

      {BREADCRUMB[tab] && (
        <div className="border-b border-[#111] bg-[#050505]">
          <div className="max-w-4xl mx-auto px-4 py-2">
            <span className="text-[9px] font-mono text-gray-700 uppercase tracking-widest">{BREADCRUMB[tab]}</span>
          </div>
        </div>
      )}

      <main className={tab === 'envoy' ? '' : 'pb-24'}>
        {tab === 'home'     && <HomePage setTab={setTab} />}
        {tab === 'works'    && <WorksPage />}
        {tab === 'labs'     && <LabsPage />}
        {tab === 'exchange' && <ExchangePage setTab={setTab} />}
        {tab === 'mark'     && <MarkPage />}
        {tab === 'envoy'    && <EnvoyEmbed />}
      </main>

      {tab !== 'envoy' && (
        <footer className="fixed bottom-0 w-full border-t border-[#111] bg-[#050505] py-2 text-center">
          <span className="font-mono text-[9px] text-gray-500 uppercase tracking-widest">© 2026 <a href="https://allmergroup.com" className="hover:text-white transition-colors">Allmer Group</a> — Foundry Internal — Confidential</span>
        </footer>
      )}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
